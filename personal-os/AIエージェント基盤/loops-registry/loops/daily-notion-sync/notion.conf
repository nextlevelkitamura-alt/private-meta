# notion.conf — daily-notion-sync（session-table.sh）の設定。git管理・secretは書かない（値はページIDのみ）。
# NOTION_PARENT_PAGE_ID: Notionワークスペースの親ページ「Personal OS」のpage id。
#   空のままなら実行時にsearch APIで自動発見し、見つけたIDを state/（gitignore・実行時キャッシュ）へ保存する。
#   renderer由来のN1/N2/N3が発見済みのidと同じキャッシュファイル(state/notion-parent-page-id)を
#   共有するため、そちらで既に解決済みなら再検索しない。
NOTION_PARENT_PAGE_ID=
