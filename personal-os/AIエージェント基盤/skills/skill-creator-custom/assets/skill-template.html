<!doctype html>
<!--
  SKILL.html 骨組みテンプレ（人間向け説明書）。
  - 対になる SKILL.md と同じベース名にする（命名ルールの正本は GLOBAL_AGENTS.md）。
  - Skill を編集した作業単位の完了条件として再生成する（create-rules.md §9）。
  - self-contained: 外部CSS/JS/フォント/画像を使わない。ローカルでブラウザ直接表示する。
  - 固定6節の順序を守る: ①何をする ②いつ発火 ③構造図 ④各workflowの中身 ⑤referencesの中身 ⑥絶対ルール・安全＋更新日。
  - 単一SKILL.md構成で workflows/・references/ が無いSkillは④⑤を省く。
  - ④⑤は人間がmdを開かずに中身を掴める粒度（workflow=Stepの流れと要点、reference=節見出しと役割）。md本文の逐語コピーはしない。
  - <!-- 差込: xxx --> を目印に中身を差し替える。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!-- 差込: skill名 --> — Skill説明書</title>
<style>
  :root{
    --ground:#ECEEF3; --surface:#FFFFFF; --surface-2:#F5F6FA;
    --ink:#19212F; --muted:#5F6879; --line:#DBDFEA;
    --accent:#2C3A8C; --accent-ink:#202C6E; --accent-soft:#E9ECFA;
    --go:#2E7D5B; --go-ink:#1E5A40; --go-soft:#E3F1EA;
    --warn:#B4472B; --warn-ink:#8C3620; --warn-soft:#F7E8E2;
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP","Segoe UI",sans-serif;
    --mono:"SF Mono","SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);line-height:1.7;-webkit-font-smoothing:antialiased;padding:40px 20px 72px}
  .wrap{max-width:840px;margin:0 auto;display:flex;flex-direction:column;gap:36px}
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:500;margin:0 0 10px}
  h1{font-size:29px;font-weight:600;letter-spacing:-.01em;margin:0;line-height:1.2}
  .lede{margin:12px 0 0;font-size:15.5px;color:var(--muted);max-width:64ch}
  h2{font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:500;margin:0 0 14px}
  section{display:flex;flex-direction:column}
  p{margin:0 0 10px;font-size:14px}
  ul{margin:0;padding-left:20px;font-size:14px}
  li{margin-bottom:7px}
  figure{margin:0;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:18px;overflow-x:auto}
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:13px;background:var(--surface)}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:520px}
  th,td{text-align:left;padding:12px 15px;border-bottom:1px solid var(--line);vertical-align:top}
  thead th{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:500}
  tbody tr:last-child td{border-bottom:0}
  code{font-family:var(--mono);font-size:12.5px;background:var(--surface-2);padding:1px 6px;border-radius:6px}
  .rule{border-left:3px solid var(--warn);background:var(--warn-soft);border-radius:0 10px 10px 0;padding:12px 16px;font-size:13.5px}
  .wf,.ref{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:15px 18px;margin-bottom:12px}
  .wf-h{margin:0 0 6px;font-size:14px;font-weight:600}
  .wf-d{margin:0 0 10px;font-size:13.5px;color:var(--muted)}
  .wf-c{margin:10px 0 0;font-size:13px;color:var(--muted)}
  .steps{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px}
  .steps .step{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:4px 10px}
  .steps .step.gate{background:var(--warn-soft);border-color:var(--warn);color:var(--warn-ink);font-weight:600}
  .steps .arr{color:var(--muted)}
  .ref ul{margin:0;padding-left:18px;font-size:13px}
  .ref li{margin-bottom:4px}
  .foot{font-size:12.5px;color:var(--muted);border-top:1px solid var(--line);padding-top:16px}
</style>
</head>
<body>
  <div class="wrap">

    <!-- ① 何をするSkillか -->
    <header>
      <p class="eyebrow">Skill説明書 · <!-- 差込: meta / repo --></p>
      <h1><!-- 差込: skill名 --></h1>
      <p class="lede"><!-- 差込: 何をするSkillか1行 --></p>
    </header>

    <!-- ② いつ発火するか -->
    <section>
      <h2>いつ使うか（発火する発話例）</h2>
      <ul>
        <li><!-- 差込: 代表的なユーザー発話 --></li>
        <li><!-- 差込: 代表的なユーザー発話 --></li>
      </ul>
    </section>

    <!-- ③ 構造図 -->
    <section>
      <h2>構造</h2>
      <figure>
        <pre style="margin:0;font-family:var(--mono);font-size:12.5px;line-height:1.9"><!-- 差込: フォルダ構造ツリー（SKILL.md / workflows/ / references/ / assets/） --></pre>
      </figure>
    </section>

    <!-- ④ 各workflowの中身（workflowを持つSkillだけ。単一SKILL.md構成なら削除） -->
    <section>
      <h2>各workflowの中身</h2>
      <!-- workflow 1つにつき wf ブロックを1つ。何をするか→Stepの流れ→完了条件 の順。 -->
      <div class="wf">
        <p class="wf-h"><code><!-- 差込: workflow名 --></code> — <!-- 差込: いつ使うか（1行） --></p>
        <p class="wf-d"><!-- 差込: 何をするworkflowか（1〜2行） --></p>
        <div class="steps">
          <span class="step"><!-- 差込: Step1要点 --></span>
          <span class="arr">→</span>
          <span class="step gate"><!-- 差込: 承認ゲート等（あれば） --></span>
          <span class="arr">→</span>
          <span class="step"><!-- 差込: 最終Step要点 --></span>
        </div>
        <p class="wf-c"><b>完了条件:</b> <!-- 差込: このworkflowの完了条件 --></p>
      </div>
    </section>

    <!-- ⑤ referencesの中身（referenceを持つSkillだけ。無ければ削除） -->
    <section>
      <h2>referencesの中身</h2>
      <!-- reference 1つにつき ref ブロックを1つ。節見出しと役割を並べる。 -->
      <div class="ref">
        <p class="wf-h"><code><!-- 差込: reference名 --></code> — <!-- 差込: 役割（1行） --></p>
        <ul>
          <li><b><!-- 差込: 節名 --></b>: <!-- 差込: その節が持つもの --></li>
        </ul>
        <p class="wf-c"><b>いつ読む:</b> <!-- 差込: どのworkflowから、どんな時に読むか --></p>
      </div>
    </section>

    <!-- ⑥ 絶対ルール・安全方針＋更新日 -->
    <section>
      <h2>絶対ルール・安全方針</h2>
      <div class="rule">
        <!-- 差込: 守るべき絶対ルール・副作用・承認ゲート -->
      </div>
    </section>

    <p class="foot">更新日: <!-- 差込: YYYY-MM-DD --> ／ 正本: <code>SKILL.md</code>（この説明書はSKILL.mdから生成した人間向け表示。編集はmd側で行う）</p>

  </div>
</body>
</html>
