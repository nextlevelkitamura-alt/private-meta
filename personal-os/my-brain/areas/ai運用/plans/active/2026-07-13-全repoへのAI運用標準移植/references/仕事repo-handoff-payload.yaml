schema_version: "repo-handoff/v1"
kind: "Private → 仕事repo / Gate 0安全化"
mode: "対象repoをrootとする新しい可視sessionを起動。既存session IDの移管・reparentは禁止"

canonical_repo_path: "/Users/kitamuranaohiro/Private/projects/active/仕事"
target_root: "/Users/kitamuranaohiro/Private/projects/active/仕事"
cwd: "/Users/kitamuranaohiro/Private/projects/active/仕事"

plan_ref:
  program: "/Users/kitamuranaohiro/Private/personal-os/my-brain/areas/ai運用/plans/active/2026-07-13-全repoへのAI運用標準移植/program.md"
  child: "/Users/kitamuranaohiro/Private/personal-os/my-brain/areas/ai運用/plans/active/2026-07-13-全repoへのAI運用標準移植/plans/02-仕事repo緊急安全化.md"
  rule: "計画正本は中央program一式。仕事repo内に同じplanを複製しない"

start_snapshot:
  captured_at: "2026-07-13 JST"
  branch: "master"
  head: "6e0862e53a9392b886511fa4f6e5b07b20f574e4"
  upstream: "origin/master"
  upstream_head: "25c981ad936f4b444e6a706b43bc4d532e3591cc"
  behind: 0
  ahead: 5
  staged_paths: []
  dirty:
    tracked: 8
    untracked: 2
    total: 10

gate0_fixed_paths:
  - ".codex/config.toml"
  - ".codex/hooks.json"
  - ".gitignore"
  - "AGENTS.md"
  - "antigravity/mcp-config-template.json"
  - "antigravity/setup.md"
  - "scripts/hooks/inject-line-rules.sh"
  - "scripts/setup-codespace.sh"
  - ".claude/settings.json"
  - ".mcp.json"

allowed_first_action:
  package: "Child 02 / S01"
  steps:
    - "新sessionのcwdとgit rootがcanonical_repo_pathであることをread-only確認"
    - "最寄りAGENTS.mdを全文読込み"
    - "branch・HEAD・upstream・staged・dirty 10pathをhandoff snapshotと照合"
    - "10path以外へ差分が増えていないことを確認"
    - "credential値を表示せず、失効・再発行・runtime保管の人間確認状態だけを記録"
  write_permission: "human_confirmationsが全て揃うまでは編集・stage・commitを開始しない"

forbidden_actions:
  - "Gate 0完了前にChild 04以降のwriterを入れる"
  - "固定10path以外を編集・stage・commitへ混ぜる"
  - "git add -A、git add ."
  - "既存dirty差分の巻き戻し、checkout、reset、stash"
  - "credential、token、secret、環境変数値の表示・記録・commit"
  - "Git履歴書換、filter-repo、rebase、force push"
  - "hookによる無条件stage・commit"
  - "旧path /Users/kitamuranaohiro/Private/仕事 の復活"
  - "仕事repo内への中央program複製"
  - "明示承認前のpush"
  - "外部サービスへの書込・更新・削除"

session_board:
  required: true
  checks:
    - "対象repoをrootとする新しい可視sessionとして登録"
    - "当日Dailyの動いているエージェントに新session行がある"
    - "repo名・役割・現在地を仕事repo Gate 0として識別できる"
    - "subagent/headlessを独立sessionとして登録しない"
    - "Private側はhandoff確認後にfinish。調整役として残す場合だけ役割と終了責任を明記して2行併存"

human_confirmations:
  credential:
    status: "BLOCKED-BY-HUMAN"
    required:
      - "LINE credentialを失効・再発行済み"
      - "Supabase credentialを失効・再発行済み"
      - "新しい値をGit外のruntime保管へ入れ、値自体はAIへ渡さない"
  history:
    status: "BLOCKED-BY-HUMAN"
    required: "credential失効後は既存Git履歴を保持し、履歴書換を行わない方針を確認"
  fresh_session:
    status: "BLOCKED-BY-HUMAN"
    required: "古いClaude/Codex sessionを閉じ、新sessionでGlobal・repo-local hookとAGENTSを再読込"
  commit:
    status: "BLOCKED-BY-HUMAN"
    required: "検証PASS後、固定10pathだけを明示path指定でstage・commitしてよいことを確認"
  push:
    status: "NOT-APPROVED"
    default: "commit後もpushしない"

rollback:
  before_human_gate:
    - "変更を加えず停止。既存10pathはユーザー作業として保持"
  after_file_change_before_commit:
    - "今回変更した部分だけをpath単位で戻す"
    - "開始時から存在したdirty内容を復元・上書きしない"
  after_commit:
    - "履歴書換せず、必要なら対象pathだけのrevert commit候補を人間へ提示"
  credential:
    - "失効済みcredentialを復活させない"
    - "問題時は新credentialを再失効・再発行し、runtime保管だけ更新"
  hook:
    - "fresh sessionで不良なら自動commitを止め、旧sessionへ戻らず修正または登録解除を人間判断"
  push:
    - "未pushを維持してremote影響0"

completion_evidence:
  session:
    - "新session ID / session-board登録行"
    - "cwdとgit rootがcanonical_repo_pathで一致"
    - "仕事repo AGENTS.md読込み確認"
  snapshot:
    - "branch・HEAD・upstream・ahead数"
    - "staged 0"
    - "固定10path以外の差分0"
  security:
    - "LINE・Supabase失効/再発行の人間確認"
    - "credential値を含まないscan結果"
    - "credential実値がGit追跡対象にない"
    - "履歴保持方針の人間確認"
  runtime:
    - "fresh Claude/Codex sessionでAGENTSとhookを再読込"
    - "repo-local hookがgit rootを動的解決"
    - "自動git add / commit / push 0"
  validation:
    - "固定10pathに対応する構文・hook・manifestテスト"
    - "実行command・exit code・対象範囲"
    - "diffが固定10path内だけ"
  commit:
    - "人間承認記録"
    - "明示pathでstageした一覧"
    - "commit hash"
    - "commit直後のstaged 0"
    - "push未実施"
  gate_result:
    - "Child 02 S01〜S05の各PASS"
    - "Integration担当がGate Aを開けてよいと証拠確認"

