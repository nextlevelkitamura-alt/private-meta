name: ミニマル文字のみ
description: 中央に大きな文字1つだけ。キーメッセージ・章扉・余白の美学を活かす。
slots:
  - position: center
    type: text
    elements: [大きな見出し1行（48-80pt）]
    font_weight: Bold or Light（極端に）
suit_for:
  - キーメッセージスライド
  - 章扉
  - 1スライド1メッセージの極致
  - Big Idea の提示
not_suit_for:
  - 説明・補足
  - 配布資料
notes:
  - フォント・余白・色で世界観を作る
  - 13-30字以内推奨
